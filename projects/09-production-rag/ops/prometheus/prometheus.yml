global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: production-rag-api
    metrics_path: /metrics
    dns_sd_configs:
      - names:
          - rag-api
        type: A
        port: 8008
        refresh_interval: 15s
