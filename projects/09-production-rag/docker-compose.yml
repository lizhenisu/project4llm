services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: rag-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - ./volumes/etcd:/etcd

  minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: rag-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - ./volumes/minio:/minio_data

  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-production_rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-production_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    build:
      context: ./ops/pgbouncer
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
      PGBOUNCER_MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-200}
      PGBOUNCER_DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-20}
      PGBOUNCER_RESERVE_POOL_SIZE: ${PGBOUNCER_RESERVE_POOL_SIZE:-5}
      PGBOUNCER_MAX_DB_CONNECTIONS: ${PGBOUNCER_MAX_DB_CONNECTIONS:-60}
      PGBOUNCER_SERVER_IDLE_TIMEOUT_SECONDS: ${PGBOUNCER_SERVER_IDLE_TIMEOUT_SECONDS:-600}
      PGBOUNCER_QUERY_WAIT_TIMEOUT_SECONDS: ${PGBOUNCER_QUERY_WAIT_TIMEOUT_SECONDS:-30}
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-production_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.6.13
    container_name: rag-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    depends_on:
      - etcd
      - minio

  rag-worker:
    build:
      context: ../..
      dockerfile: projects/09-production-rag/Dockerfile
    command: ["./scripts/start_worker.sh"]
    env_file:
      - ./.env
    environment:
      MILVUS_URI: http://milvus:19530
      RAG_COLLECTION: rag_chunks_v1
      RAG_OBJECT_STORE_DIR: /app/projects/09-production-rag/object_store
      RAG_OBJECT_STORE_BACKEND: ${RAG_OBJECT_STORE_BACKEND:-s3}
      RAG_S3_ENDPOINT_URL: ${RAG_S3_ENDPOINT_URL:-http://minio:9000}
      RAG_S3_ACCESS_KEY_ID: ${RAG_S3_ACCESS_KEY_ID:-minioadmin}
      RAG_S3_SECRET_ACCESS_KEY: ${RAG_S3_SECRET_ACCESS_KEY:-minioadmin}
      RAG_S3_BUCKET: ${RAG_S3_BUCKET:-production-rag}
      RAG_S3_PREFIX: ${RAG_S3_PREFIX:-app}
      RAG_IMAGE_EMBEDDING_BACKEND: ${RAG_IMAGE_EMBEDDING_BACKEND:-siliconflow}
      EMBEDDING_DIM: "1024"
      IMAGE_EMBEDDING_DIM: "1024"
      RAG_RUNTIME_DIR: /app/projects/09-production-rag/runtime
      RAG_METADATA_DATABASE_URL: postgresql://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-rag_password}@pgbouncer:6432/${POSTGRES_DB:-production_rag}
      NEW_API_URL: ${NEW_API_URL:-}
      NEW_API_KEY: ${NEW_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gemini-3-flash-preview}
      SILICONFLOW_URL: ${SILICONFLOW_URL:-https://api.siliconflow.cn}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      RAG_EMBEDDING_BACKEND: ${RAG_EMBEDDING_BACKEND:-siliconflow}
      RAG_RERANK_BACKEND: ${RAG_RERANK_BACKEND:-siliconflow}
    volumes:
      - ./runtime:/app/projects/09-production-rag/runtime
      - ./volumes/db:/app/projects/09-production-rag/runtime/db
      - ./object_store:/app/projects/09-production-rag/object_store
    depends_on:
      milvus:
        condition: service_started
      pgbouncer:
        condition: service_healthy
    restart: unless-stopped

  rag-api:
    build:
      context: ../..
      dockerfile: projects/09-production-rag/Dockerfile
    env_file:
      - ./.env
    environment:
      MILVUS_URI: http://milvus:19530
      RAG_COLLECTION: rag_chunks_v1
      RAG_OBJECT_STORE_DIR: /app/projects/09-production-rag/object_store
      RAG_OBJECT_STORE_BACKEND: ${RAG_OBJECT_STORE_BACKEND:-s3}
      RAG_S3_ENDPOINT_URL: ${RAG_S3_ENDPOINT_URL:-http://minio:9000}
      RAG_S3_ACCESS_KEY_ID: ${RAG_S3_ACCESS_KEY_ID:-minioadmin}
      RAG_S3_SECRET_ACCESS_KEY: ${RAG_S3_SECRET_ACCESS_KEY:-minioadmin}
      RAG_S3_BUCKET: ${RAG_S3_BUCKET:-production-rag}
      RAG_S3_PREFIX: ${RAG_S3_PREFIX:-app}
      RAG_IMAGE_EMBEDDING_BACKEND: ${RAG_IMAGE_EMBEDDING_BACKEND:-siliconflow}
      EMBEDDING_DIM: "1024"
      IMAGE_EMBEDDING_DIM: "1024"
      RAG_RUNTIME_DIR: /app/projects/09-production-rag/runtime
      RAG_METADATA_DATABASE_URL: postgresql://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-rag_password}@pgbouncer:6432/${POSTGRES_DB:-production_rag}
      RAG_INGEST_EXECUTION_MODE: ${RAG_INGEST_EXECUTION_MODE:-external}
      RAG_INGEST_OPERATION_AUDIT_RETENTION_DAYS: ${RAG_INGEST_OPERATION_AUDIT_RETENTION_DAYS:-90}
      RAG_QUERY_RATE_LIMIT_WINDOW_SECONDS: ${RAG_QUERY_RATE_LIMIT_WINDOW_SECONDS:-60}
      RAG_QUERY_RATE_LIMIT_GLOBAL: ${RAG_QUERY_RATE_LIMIT_GLOBAL:-600}
      RAG_QUERY_RATE_LIMIT_TENANT: ${RAG_QUERY_RATE_LIMIT_TENANT:-120}
      RAG_QUERY_RATE_LIMIT_USER: ${RAG_QUERY_RATE_LIMIT_USER:-30}
      RAG_QUERY_REWRITE_BACKEND: ${RAG_QUERY_REWRITE_BACKEND:-llm}
      RAG_QUERY_REWRITE_HISTORY_TURNS: "6"
      RAG_QUERY_REWRITE_MAX_TOKENS: "256"
      RAG_ANSWER_BACKEND: ${RAG_ANSWER_BACKEND:-llm}
      NEW_API_URL: ${NEW_API_URL:-}
      NEW_API_KEY: ${NEW_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gemini-3-flash-preview}
      SILICONFLOW_URL: ${SILICONFLOW_URL:-https://api.siliconflow.cn}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      RAG_EMBEDDING_BACKEND: ${RAG_EMBEDDING_BACKEND:-siliconflow}
      RAG_RERANK_BACKEND: ${RAG_RERANK_BACKEND:-siliconflow}
    expose:
      - "8008"
    volumes:
      - ./runtime:/app/projects/09-production-rag/runtime
      - ./volumes/db:/app/projects/09-production-rag/runtime/db
      - ./object_store:/app/projects/09-production-rag/object_store
    depends_on:
      milvus:
        condition: service_started
      pgbouncer:
        condition: service_healthy
      rag-worker:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8008/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  rag-web:
    build:
      context: ../..
      dockerfile: projects/09-production-rag/frontend/Dockerfile
    container_name: rag-web
    ports:
      - "8080:80"
    depends_on:
      rag-api:
        condition: service_healthy

  rag-mock-external-api:
    build:
      context: ../..
      dockerfile: projects/09-production-rag/Dockerfile
    container_name: rag-mock-external-api
    profiles: ["load-test"]
    command: ["uvicorn", "tests.load.mock_external_api:app", "--host", "0.0.0.0", "--port", "18080"]
    environment:
      MOCK_LLM_LATENCY_MS: ${MOCK_LLM_LATENCY_MS:-10000}
      MOCK_LLM_MODE: ${MOCK_LLM_MODE:-echo}
      MOCK_EMBEDDING_LATENCY_MS: ${MOCK_EMBEDDING_LATENCY_MS:-120}
      MOCK_EMBEDDING_MODE: ${MOCK_EMBEDDING_MODE:-random}
      MOCK_EMBEDDING_DIM: ${MOCK_EMBEDDING_DIM:-1024}
      MOCK_RERANK_LATENCY_MS: ${MOCK_RERANK_LATENCY_MS:-180}
      MOCK_RERANK_MODE: ${MOCK_RERANK_MODE:-identity}
    ports:
      - "18080:18080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18080/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: rag-prometheus
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${RAG_PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      rag-api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:13.0.3
    container_name: rag-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  rag-ingest:
    build:
      context: ../..
      dockerfile: projects/09-production-rag/Dockerfile
    container_name: rag-ingest
    profiles: ["ingest"]
    command: ["./scripts/start_ingest.sh"]
    env_file:
      - ./.env
    environment:
      MILVUS_URI: http://milvus:19530
      RAG_COLLECTION: rag_chunks_v1
      RAG_OBJECT_STORE_DIR: /app/projects/09-production-rag/object_store
      RAG_OBJECT_STORE_BACKEND: ${RAG_OBJECT_STORE_BACKEND:-s3}
      RAG_S3_ENDPOINT_URL: ${RAG_S3_ENDPOINT_URL:-http://minio:9000}
      RAG_S3_ACCESS_KEY_ID: ${RAG_S3_ACCESS_KEY_ID:-minioadmin}
      RAG_S3_SECRET_ACCESS_KEY: ${RAG_S3_SECRET_ACCESS_KEY:-minioadmin}
      RAG_S3_BUCKET: ${RAG_S3_BUCKET:-production-rag}
      RAG_S3_PREFIX: ${RAG_S3_PREFIX:-app}
      RAG_TEXT_INPUT: ${RAG_TEXT_INPUT:-}
      RAG_IMAGE_INPUT: ${RAG_IMAGE_INPUT:-}
      RAG_IMAGE_EMBEDDING_BACKEND: ${RAG_IMAGE_EMBEDDING_BACKEND:-siliconflow}
      EMBEDDING_DIM: "1024"
      IMAGE_EMBEDDING_DIM: "1024"
      RAG_METADATA_DATABASE_URL: postgresql://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-rag_password}@pgbouncer:6432/${POSTGRES_DB:-production_rag}
    volumes:
      - ./object_store:/app/projects/09-production-rag/object_store
      - ./ingest:/data:ro
    depends_on:
      milvus:
        condition: service_started
      pgbouncer:
        condition: service_healthy

volumes:
  grafana-data:
  prometheus-data:
