  <title>危险能量控制程序 - 班次交接</title>
</head>
<body>
  <main>
    <h1>危险能量控制程序</h1>
    <h2>班次交接</h2>
    <p>跨班维护时，交班授权员工不得直接把锁交给接班员工。现场负责人应使用组锁箱或主标签系统，逐项确认设备编号、隔离点、残余能量状态和未完成工作。</p>
    <p>接班员工必须重新核对能源隔离装置，并在工作许可证上签入。交班员工签出后才能移除个人锁，确保任何时刻都有授权员工对危险能量控制负责。</p>
    <h2>临时恢复能源</h2>
    <p>如果调试需要临时通电，应清理人员和工具，移除锁具，执行测试；测试结束后重新停机、隔离、上锁挂牌，并再次完成零能量验证。</p>
  </main>
</body>
</html>
